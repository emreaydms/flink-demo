version: "3.8"

services:
  jobmanager:
    image: apache/flink:1.18.1-scala_2.12-java11
    container_name: flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - FLINK_PROPERTIES=${FLINK_PROPERTIES}
    networks:
      - flink-net

  taskmanager:
    image: apache/flink:1.18.1-scala_2.12-java11
    container_name: flink-taskmanager
    depends_on:
      - jobmanager
    command: taskmanager
    scale: 1
    environment:
      - FLINK_PROPERTIES=${FLINK_PROPERTIES}
    networks:
      - flink-net

  pyflink:
    image: apache/flink:1.18.1-scala_2.12-java11
    container_name: flink-pyflink
    depends_on:
      - jobmanager
      - taskmanager
    entrypoint: /bin/bash
    stdin_open: true
    tty: true
    volumes:
      - ./:/opt/flink/userjobs
    working_dir: /opt/flink/userjobs
    environment:
      - FLINK_PROPERTIES=${FLINK_PROPERTIES}
    networks:
      - flink-net

networks:
  flink-net:
    driver: bridge
